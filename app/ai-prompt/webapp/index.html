<!doctype html>
<html>
<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Prompt</title>
  <script
    id="sap-ui-bootstrap"
    src="https://ui5.sap.com/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-libs="sap.m"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"
    data-sap-ui-resourceRoots='{"cap-ai-orchestration.ai-prompt":"./"}'>
  </script>
  <script>
    sap.ui.getCore().attachInit(() => {
      sap.ui.require(['sap/ui/core/ComponentContainer'], ComponentContainer => {
        new ComponentContainer({
          name: 'cap-ai-orchestration.ai-prompt',
          height: '100%'
        }).placeAt('content');
      });
    });
  </script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content"></body>
</html>
